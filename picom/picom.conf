#################################
#     GLX backend
#################################
backend = "glx";

#################################
#       Shadows
#################################
shadow = true;
shadow-radius = 3;
shadow-offset-x = 5;
shadow-offset-y = 2;
shadow-opacity = 0.2;

#################################
#       Opacity
#################################
opacity-rule = [
  "85:class_g = 'Sakura'",
  "85:class_g = 'Polybar'",
#  "85:class_g = 'urxvt'",
#  "90:class_g = 'discord'"
  "80:class_g = 'volnoti'"
];

